<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css.css">      
        <title>JAVASCRIPT</title>
    </head>
    <body>
        <div class="main">
            <img src="https://1000logos.net/wp-content/uploads/2021/05/GitHub-logo.png" class="image"/>
            <div class="container">
                <label for="inputelement" class="label">Username or emailaddress</label>
                <input type="text" id="nameelement"/>
            </div>
            <div class="container" style="text-align:center">
                <label for="passwordelement" class="label">Password</label>
                <input type="text" id="passwordelement" />
            </div>
            <button class="btn" id="signin">signin</button>
            <p>-------------------or---------------------</p>
            <div>
                 <button class="btn1" onclick="google()">Continue with Google</button>
                 <button class="btn1" onclick="apple()">Continue with Apple</button>
            </div>
            <p>New to GitHub?<span class="span">Create an account</span></p>
            <p class="span">signin with a passkey</p>
 

        </div>
        <script src="javascript.js"></script>
    </body>
</html>
