<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./responsivepage.css">
        <title>MiniProject</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <form class="row g-3" id="myform">
        <div class="col-12 col-md-6">
            <label for="validationServer01" class="form-label">FullName</label>
            <input type="text" class="form-control is-invalid" id="validationServer01"  name="fullname" aria-describedby="namefeedback" required>
            <div class="invalid-feedback" id="namefeedback">
            Enter your name
            </div>
        </div>
        <div class="col-12 col-md-6">
            <label for="validationServerUsername" class="form-label">Email</label>
            <div class="input-group has-validation">
            <span class="input-group-text" id="inputGroupPrepend3">@</span>
            <input type="email" class="form-control is-invalid" id="validationServerUsername" name="email" aria-describedby="inputGroupPrepend3 validationServerUsernameFeedback" required>
            <div id="validationServerUsernameFeedback" class="invalid-feedback">
                Choose a Email.
            </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
                <label for="inputPhoneno" class="form-label">Phone No</label>
                <input type="tel" class="form-control is-invalid" id="inputPhoneno" name="phoneno" required>
                <div class="invalid-feedback" id="phonefeedback">
            Enter phone number
            </div>
            </div>
            <fieldset class="row mb-3">
                <legend class="col-form-label col-sm-2 pt-0" id="gender">Gender</legend>
                <div class="col-sm-10">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios1" value="option1" >
                    <label class="form-check-label" for="gridRadios1">
                    Male
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios2" value="option2">
                    <label class="form-check-label" for="gridRadios2">
                    Female
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios3" value="option3">
                    <label class="form-check-label" for="gridRadios3">
                    Other
                    </label>
                </div>
                 <div class="invalid-feedback" id="genderfeedback">
            Select your gender
            </div>
                </div>
                </fieldset>
            <fieldset class=" mb-3" >
                <legend class="col-form-label col-sm-2 pt-0" id="skills">Skills (Select at least one):</legend>
                <div class="form-check" >
                    <input class="form-check-input" type="checkbox" value="HTML" id="skillHTML" name="skills">
                    <label class="form-check-label" for="skillHTML">HTML</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="CSS" id="skillCSS" name="skills">
                    <label class="form-check-label" for="skillCSS">CSS</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="JavaScript" id="skillJS" name="skills">
                    <label class="form-check-label" for="skillJS">JavaScript</label>
                </div>
                <div class="invalid-feedback" id="skillsfeedback">
            Select your skills
            </div>
                </fieldset>
         <div class="col-12 col-md-6">
                <label for="inputPassword" class="form-label">Password</label>
                <input type="password" class="form-control is-invalid " id="inputPassword" name="password" aria-describedby="passwordfeedback" >
                <div class="invalid-feedback" id="passwordfeedback">
            Enter password
            </div>
            </div>
              <div class="col-12 col-md-6">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control is-invalid" id="confirmPassword"name="confirmpassword" aria-describedby="confirmpasswordfeedback" >
                <div class="invalid-feedback" id="confirmpasswordfeedback">
            Confirm Password
            </div>
            </div>
        <div class="col-12">
            <button class="btn btn-primary" type="submit" id="submit">Submit form</button>
        </div>
        </form>
        
        <div id="profilePreview" class="mt-4"></div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="responsivepage.js"></script>
    </body>
</html>
